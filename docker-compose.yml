version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3.11-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  ts-service:
    build: ./services/typescript-service
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    command: ["sh", "-c", "apk add --no-cache netcat-openbsd && sh /app/wait-for-rabbit.sh rabbitmq 5672 && node dist/index.js"]
    volumes:
      - ./tools/scripts/wait-for-rabbit.sh:/app/wait-for-rabbit.sh:ro

  python-service:
    build: ./services/python-service
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    command: ["sh", "-c", "sh /app/wait-for-rabbit.sh rabbitmq 5672 && python main.py"]
    volumes:
      - ./tools/scripts/wait-for-rabbit.sh:/app/wait-for-rabbit.sh:ro

volumes:
  rabbitmq_data:
